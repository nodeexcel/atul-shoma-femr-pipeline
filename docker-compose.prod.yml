services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_prod:/var/lib/postgresql/data

  web:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    env_file: .env.prod
    volumes:
      - media_prod:/app/media
      - logs_prod:/app/logs
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      target: production
    env_file: .env.prod
    volumes:
      - media_prod:/app/media
      - logs_prod:/app/logs
    depends_on:
      - redis
      - db
    restart: unless-stopped
    command: celery -A backend worker --loglevel=info --concurrency=5

volumes:
  media_prod:
  logs_prod:
  postgres_prod:
